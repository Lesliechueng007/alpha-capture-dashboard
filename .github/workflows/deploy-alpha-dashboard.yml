name: Deploy Alpha Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: alpha-dashboard-refresh
  cancel-in-progress: true

jobs:
  refresh:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh dashboard
        working-directory: alpha_capture_system
        run: python3 scripts/refresh_dashboard.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add alpha_capture_system/reports/alpha_watchlist_latest.md
          git add alpha_capture_system/reports/alpha_watchlist_snapshot.json
          git add alpha_capture_system/web/data/watchlist.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh alpha dashboard data [skip ci]"
            git push
          fi
