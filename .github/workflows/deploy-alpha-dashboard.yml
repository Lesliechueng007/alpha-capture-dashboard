name: Deploy Alpha Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "alpha_capture_system/config/**"
      - "alpha_capture_system/scripts/**"
      - "alpha_capture_system/src/**"
      - "alpha_capture_system/reports/**"
      - "alpha_capture_system/web/**"
      - ".github/workflows/deploy-alpha-dashboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh dashboard
        working-directory: alpha_capture_system
        run: python3 scripts/refresh_dashboard.py

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: alpha_capture_system/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
