<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Watchlist Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>Alpha Watchlist Dashboard</h1>
        <p>加密阿尔法项目追踪看板（估值、流动性、风险、叙事）</p>
        <div class="meta">
          <div class="meta-left">
            <span id="generatedAt">加载中...</span>
            <span id="lastSyncAt">页面同步中...</span>
          </div>
          <button id="refreshBtn" type="button">立即刷新</button>
        </div>
      </header>

      <section class="stats" id="stats"></section>
      <section class="review-block">
        <h2>交易复盘（标签化 + Alpha/Beta 粗归因）</h2>
        <section class="stats" id="reviewStats"></section>
        <section class="table-wrap">
          <h3>标签表现（仅统计已平仓）</h3>
          <div id="tagTable"></div>
        </section>
        <section class="table-wrap">
          <h3>最近交易记录</h3>
          <div id="tradeTable"></div>
        </section>
      </section>
      <section class="cards" id="cards"></section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
